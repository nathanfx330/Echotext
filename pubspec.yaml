name: echotext
description: "A Flutter app for on-the-fly TTS using Piper."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # --- ADDED DEPENDENCIES ---
  audioplayers: ^6.0.0
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true